<!DOCTYPE html>
<html lang="en">
<head>

            background-color: #e0e0e0;

            background-color: #000000;
            color: white;
        }
        #next {

            color: white;

            padding: 10px 20px;

            {question: "Susie is playing with blocks and is trying to build a tower; she tries but cannot build a tower. Susie's mother helps her build a four-block tower. Later, Susie builds a four-block tower without her mother's help. According to Vygotsky, the inability to build the tower on her own is known as:", options: ["a. Scaffolding", "b. The zone of proximal development", "c. Assisted discovery", "d. Learning by imitation"], answer: 1},
            {question: "According to Erickson, when an individual fails to develop a strong sense of identity, the individual will have troubles with the development of:", options: ["a. Autonomy", "b. Initiative", "c. Intimacy", "d. Integrity"], answer: 2},

            {question: "Jacob's father tells Jacob to clean his room. When Jacob asks why, his father responds, 'Because I said so.' The father's response is most representative of which parenting style?", options: ["a. Uninvolved", "b. Authoritarian", "c. Authoritative", "d. Permissive"], answer: 1},
            {question: "Harry Harlow used baby monkeys and several different kinds of 'surrogate mothers' to investigate which factors are important in early development and attachment. According to his findings, baby monkeys:", options: ["a. preferred a soft terrycloth 'mother' to a wire-mesh 'mother' that held a bottle", "b. preferred a wire-mesh 'mother' that held a bottle to a soft terrycloth 'mother'", "c. showed no preference", "d. preferred neither 'mother'"], answer: 0},
            {question: "Which of the following is a myth about suicide in the United States?", options: ["a. Male suicide is four times higher than that among females.", "b. It occurs in age groups of 90 years and up.", "c. Psychiatrists, physicians, and dentists are most prone.", "d. Asking someone about suicide may push that person over the edge."], answer: 3},
            {question: "Cody does what his parents say because he doesn't want to lose his television privileges. This is an example of what level in Kohlberg's theory of moral development?", options: ["a. Integrity versus despair", "b. Preconventional", "c. Conventional", "d. Postconventional"], answer: 1},
            {question: "Josie likes to play peek-a-boo with her little brother, Jack. According to Piaget, Jack finds this game fun because he has acquired ____________, which is one of the primary tasks of the sensorimotor stage of cognitive development.", options: ["a. conservation", "b. dual representation", "c. object permanence", "d. reversibility"], answer: 2},
            {question: "The theorist associated with bonding and attachment is:", options: ["a. Bowlby", "b. Adler", "c. Freud", "d. Piaget"], answer: 0},

            {question: "When it comes to displaying aggression, girls more often engage in ____________ aggression than boys.", options: ["a. hostile", "b. instrumental", "c. relational", "d. physical"], answer: 2},
            {question: "All of the following are physical characteristics of Down Syndrome EXCEPT:", options: ["a. short, stocky build", "b. almond-shaped eyes", "c. large hands and feet", "d. flattened face"], answer: 2},

            {question: "Research on gay and lesbian couples", options: ["a. They are more flexible in terms of gender roles than heterosexual couples", "b. They are as dedicated to and as effective at child rearing as are heterosexual parents.", "c. They are likely to divorce within five years of marriage", "d. They are less affectionate with each other than heterosexual partners"], answer: 1},
            {question: "In the Stanford prison study, what caused the guards to treat the prisoners harshly?", options: ["a. The prisoners repeatedly taunted the guards", "b. The guards had histories of violence and aggression", "c. The guards were unable to abandon their roles as authority figures", "d. It was the social context that determined the behaviors of both the guards and the prisoners"], answer: 3},
            {question: "In the original studies, Milgram and his colleagues found that people were more likely to disobey under all of the following circumstances EXCEPT when __________.", options: ["a. the victim was in an adjoining room so the 'teacher' heard every sound the victim made", "b. two experimenters issuing conflicting demands upon the 'teacher'", "c. the person ordering them to continue did so from a remote location", "d. the 'teacher' was aware of similar experiments and their results"], answer: 0},
            {question: "In the Stanford prison simulation, male college students agreed to participate in an experiment to discover what would happen when they took on the roles of prisoners and guards. The researchers found that __________.", options: ["a. college students readily conform to roles", "b. within a short time the prisoners became distressed and helpless", "c. within six days the experiment had to be halted", "d. all of the above"], answer: 3},
            {question: "In what ways do stereotypes distort reality?", options: ["a. Stereotypes exaggerate differences between groups", "b. Stereotypes exaggerate similarities within groups", "c. Stereotypes produce many similar reactions", "d. Stereotypes all of the above"], answer: 3},
            {question: "Jennifer has to choose between spending the evening at home with her parents or spending the evening babysitting her little sister. Jennifer does not like either of these choices. This situation describes an:", options: ["a. approach-approach conflict", "b. avoidance-avoidance conflict", "c. approach-avoidance conflict", "d. multiple approach-avoidance conflict"], answer: 1},
            {question: "Connie tells each of her clients that the best way she can help them is to attempt to look at the world from the client's point of view. This counselor is taking the _________ perspective", options: ["a. etic", "b. alloplastic", "c. emic", "d. ecocultural"], answer: 2},
            {question: "Working with individuals from different cultures requires that the counselor:", options: ["a. have sensitivity and knowledge about other cultures", "b. make a referral to another counselor", "c. have a doctorate degree in counseling", "d. have the client change his/her view"], answer: 0},
            {question: "A high standard of counseling practice when working with diverse populations involves all of the following EXCEPT:", options: ["a. treating all clients the same way", "b. being aware of one's own cultural heritage", "c. having the courage to confront fears and prejudices", "d. being empathetic to the client's worldview"], answer: 0},
            {question: "When working with individuals from different cultures, the effective counselor may NOT:", options: ["a. maintain good eye contact at all times", "b. ask questions about the client's culture", "c. disclose his/her own level of comfort with the cultural differences", "d. clarify vague or unfamiliar terms used by the client"], answer: 0},
            {question: "Murray is a bright student, but he procrastinates. He puts off writing term papers and gets incompletes, which eventually become Fs. Murray's therapist helps him establish small, specific goals rather than vague, long-range goals. The therapist also asks Murray to keep a diary of how he is spending his time when he is avoiding his studies. The method used to help Murray deal with his problem is __________ therapy.", options: ["a. psychodynamic", "b. behavioral", "c. Gestalt", "d. existential"], answer: 1},
            {question: "The social learning perspective is to the psychodynamic perspective as ____________________ are to ________________________", options: ["a. bodily fluids; cognitive expectancies", "b. environmental conditions; unconscious dynamics", "c. conscious thoughts; feelings", "d. maladaptive assumptions; learned helplessness"], answer: 1},
            {question: "The process of saying freely whatever comes to mind in connection with dreams, fantasies, or memories in the course of a psychodynamic therapy session, is referred to as _____________________________", options: ["a. systematic desensitization", "b. flooding", "c. free association", "d. dream analysis"], answer: 2},
            {question: "Which of the following is not a behavioral therapy?", options: ["a. flooding", "b. skills training", "c. exposure", "d. unconditional positive regard"], answer: 3},
            {question: "The primary goal of __________ therapy is to find meaning in life", options: ["a. rational-emotive", "b. reality", "c. existential", "d. transactional analysis"], answer: 2},
            {question: "Which of the following pairings of problem and the most successful therapy for that problem is INCORRECT?", options: ["a. childhood behavior problems and existential therapy", "b. phobia and systematic desensitization", "c. depression and rational-emotive therapy", "d. anxiety and behavior therapy"], answer: 0},
            {question: "The bond of confidence and mutual understanding established between therapist and client is called the _______.", options: ["a. therapeutic window", "b. therapeutic alliance", "c. emapthic bond", "d. therapeutic dialog"], answer: 1},
            {question: "An apparent treatment success that is due to the patient's expectation or hopes rather than the treatment itself is called ____________.", options: ["a. attention placebo", "b. placebo effect", "c. spontaneous remission", "d. reactivity"], answer: 1},
            {question: "In _________ therapy, the therapist uses logical arguments to challenge a client's unrealistic beliefs or expectations.", options: ["a. client-centered", "b. rational-emotive behavioral", "c. existential", "d. interactional"], answer: 1},
            {question: "Systematic desensizitation and flooding are ___________ techniques", options: ["a. behavioral", "b. psychodynamic", "c. reality", "d. Adlerian"], answer: 0},
            {question: "Which of the following types of therapists would be most likely to use free association and transference?", options: ["a. rational-emotive behavior therapists", "b. behavior therapists", "c. psychodynamic therapists", "d. client-centered therapists"], answer: 2},
            {question: "_________ is a humanist approach that emphasizes the tragic aspects of life, the burden of responsibility, and the need to face the inevitability of death.", options: ["a. Social interest", "b. Existentialism", "c. Self-actualization", "d. Self-concept"], answer: 1},
            {question: "According to Carl Rogers, __________ is love and support given to another with no strings attached.", options: ["a. the therapeutic alliance", "b. unconditional positive regard", "c. conditional acceptance", "d. role reversal"], answer: 1},

            {question: "Which of the following terms is associated with transactional analysis?", options: ["a. Free association", "b. Complementary transactions", "c. Dream analysis", "d. Life positions"], answer: 1},
            {question: "Which one of the following does NOT belong with the other three?", options: ["a. Glasser", "b. Adler", "c. Perls", "d. Ellis"], answer: 0},

            {question: "Freud is to ego, id, and superego as ___________ is to parent, adult, and child.", options: ["a. Berne", "b. Adler", "c. Jung", "d. Perls"], answer: 0},
            {question: "Developed by Luft and Ingham, ______________ asserts that there are four parts to the personality: the public self, the blind self, the private self, and the unknown self.", options: ["a. the Johari Window", "b. the ABC Model", "c. transactional analysis", "d. the ego-self realignment"], answer: 0},
            {question: "In which is the focus on the meaning of life and the relevance of the individual experience?", options: ["a. Existential counseling", "b. Adlerian counseling", "c. Gestalt therapy", "d. Rational-emotive behavioral therapy"], answer: 0},
            {question: "Popular techniques of this approach are role playing, 'empty chair,' and 'making the rounds.'", options: ["a. Adlerian", "b. Behavioral", "c. Gestalt", "d. Reality therapy"], answer: 2},
            {question: "Popular techniques of this approach are examination of client's memories, 'spitting in the client's soup,' and 'catching oneself.'", options: ["a. Adlerian", "b. Behavioral", "c. Gestalt", "d. Reality therapy"], answer: 0},
            {question: "In this therapeutic approach, the counselor's emphasis is on being authentic while concentrating on verbal and nonverbal messages.", options: ["a. Adlerian", "b. Existential", "c. Gestalt", "d. Reality therapy"], answer: 1},
            {question: "Paradoxical intention, implosive therapy, and thought stopping are all techniques used by _____________ counselors.", options: ["a. behavioral", "b. psychoanalytic", "c. person-centered", "d. Adlerian"], answer: 0},
            {question: "Stress inoculation is a concept introduced by:", options: ["a. John Krumboltz", "b. Joseph Wolpe", "c. Albert Bandura", "d. Donald Meichenbaum"], answer: 3},
            {question: "According to Freud, _____________________ is the most important defense mechanism. An example of this defense mechanism is when a woman who has been physically abused by her spouse doesn't remember ever being hurt by him.", options: ["a. sublimation", "b. displacement", "c. repression", "d. rationalization"], answer: 2},
            {question: "A dog that has been trained to stop and stand at attention when she hears a duck call does not stop and stand at attention when she hears a goose call. This is an example of:", options: ["a. stimulus discrimination", "b. stimulus response", "c. stimulus generalization", "d. stimulus shaping"], answer: 0},
            {question: "The disadvantage of closed-ended questions is that the client usually fails to:", options: ["a. disclose personal information and continue to dialogue with the counselor", "b. feel that the counselor is genuinely interested in his/her situation", "c. elaborate on information", "d. All of the above are disadvantages of closed-ended questions."], answer: 3},
            {question: "Rational-emotive behavior therapy follows a five-step system using ABCDE, where D stands for:", options: ["a. the affect", "b. the belief system", "c. the consequence", "d. disputing the irrational belief"], answer: 3},
            {question: "The goals of this type of therapy include gaining knowledge about the self and recognizing and integrating the self.", options: ["a. Behavioral", "b. Jungian", "c. Gestalt", "d. Reality therapy"], answer: 1},
            {question: "In order to elicit a conditioned response, the neutral stimulus that will become the conditioned stimulus must _________________ the unconditioned stimulus.", options: ["a. follow", "b. precede", "c. occur at the same time as", "d. None of the above"], answer: 1},
            {question: "In contrast to feeling sorry for the client, the counselor needs to demonstrate ___________ toward the client.", options: ["a. sympathy", "b. empathy", "c. congruency", "d. emotionality"], answer: 1},
            {question: "In order to facilitate growth in a client, the counselor uses all of the following strategies EXCEPT:", options: ["a. confrontation", "b. empathy", "c. self-disclosure", "d. abandonment"], answer: 3},
            {question: "A(n) _____________ schedule of reinforcement is the most difficult to extinguish.", options: ["a. continuous", "b. fixed ratio", "c. intermittent", "d. fixed interval"], answer: 2},
            {question: "The primary distinction between reinforcement and punishment is that reinforcement ___________ the likelihood of the behavior to occur again, while punishment _________________ the likelihood of the behavior to occur again.", options: ["a. sometimes increases; decreases", "b. increases; increases", "c. increases; decreases", "d. decreases; sometimes increases"], answer: 2},
            {question: "Negative reinforcement _______________ the behavior by ________________ a reinforcer; positive reinforcement ______________ the behavior by ____________ a reinforcer.", options: ["a. increases, taking away; increases, adding", "b. increases, adding; decreases, taking away", "c. decreases, taking away; increases, adding", "d. decreases, adding; decreases, taking away"], answer: 0},
            {question: "There are long silences, several members of the group are acting out, and it seems like all the group members are expressing frustrations with both the structure of the group and the way the group leader is functioning. Most likely this group is in the ___________ state of the group process.", options: ["a. working", "b. initial", "c. closing", "d. transition"], answer: 3},
            {question: "From this perspective the group goals are to enable members to pay close attention to their here-and-now experiences so they can recognize and integrate disowned aspects of themselves.", options: ["a. Adlerian", "b. Psychodrama", "c. Existential", "d. Gestalt"], answer: 3},
            {question: "Which of the following is NOT an advantage of group counseling?", options: ["a. Cost effectiveness", "b. Focus on individual needs", "c. Group cohesion", "d. Opportunities for feedback"], answer: 1},

            {question: "What is likely to happen in a group when the leader is authoritarian?", options: ["a. Members become dependent on the leader", "b. Members interpret this style as the leader not interested in the group", "c. The group will become cohesive", "d. The group process will become productive"], answer: 0},
            {question: "All of the following are characteristics of an open group EXCEPT:", options: ["a. Changing membership", "b. Changing leadership", "c. There is good cohesion", "d. New skills can be incorporated into the group easily"], answer: 2},
            {question: "In contrast to a homogeneous group, a heterogeneous group:", options: ["a. Is more boring and tense", "b. Has members with less range of behaviors and experiences", "c. Has members with greater awareness of themselves and others", "d. Usually disintegrates"], answer: 2},
            {question: "All of the following are assumptions of groups EXCEPT:", options: ["a. Growth depends on accurate feedback", "b. Goals are necessary for good group process", "c. Change is inevitable", "d. The leader is a member of the group"], answer: 3},

            {question: "The emphasis for this type of group is on prevention and development of healthy behaviors.", options: ["a. Secondary", "b. Tertiary", "c. Primary", "d. Quaternary"], answer: 2},

            {question: "A counselor in a social service agency working with economically deprived immigrants would focus on the person's most urgent need. The first priority would be the need for", options: ["a. self-actualization", "b. shelter and food", "c. esteem", "d. love and belonging"], answer: 1},

        let currentQuestion = 0;
        let selectedOption = -1;
        let score = 0;
        let timeLeft = 7200; // 2 hours in seconds
        let timerInterval;

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `Time left: ${Math.floor(timeLeft / 3600)}:${Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showScore();
                }
            }, 1000);
        }

        function loadQuestion() {
            if (currentQuestion >= questions.length) {
                clearInterval(timerInterval);
                showScore();
                return;
            }
            document.getElementById('progress').innerText = `${currentQuestion + 1}/${questions.length}`;
            document.getElementById('question').innerText = questions[currentQuestion].question;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            selectedOption = -1;
            questions[currentQuestion].options.forEach((opt, index) => {
                const div = document.createElement('div');
                div.classList.add('option');
                div.innerText = opt;
                div.onclick = () => selectOption(index);
                optionsDiv.appendChild(div);
            });
        }

        function selectOption(index) {
            selectedOption = index;
            const optionElems = document.querySelectorAll('.option');
            optionElems.forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
        }

        function showScore() {
            document.getElementById('timer').style.display = 'none';
            document.getElementById('progress').style.display = 'none';
            document.getElementById('category').style.display = 'none';
            document.getElementById('question').style.display = 'none';
            document.getElementById('options').style.display = 'none';
            document.getElementById('next').style.display = 'none';
            document.getElementById('score').style.display = 'block';
            document.getElementById('score').innerText = `Your score: ${score} / ${questions.length}`;
        }

        document.getElementById('next').onclick = () => {
            if (selectedOption !== -1) {
                if (selectedOption === questions[currentQuestion].answer) {
                    score++;
                }
                currentQuestion++;
                loadQuestion();
            } else {
                alert('Please select an option');
            }
        };

        startTimer();
        loadQuestion();
    </script>
